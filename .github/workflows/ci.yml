name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: cli/pnpm-lock.yaml

      - name: Install dependencies
        run: cd cli && pnpm install

      - name: Type-check
        run: cd cli && pnpm type-check

      - name: Test
        run: cd cli && pnpm test

      - name: Build
        run: cd cli && pnpm build

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version .claude-plugin/plugin.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Check if tag already exists
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version v${VERSION} detected"
          fi

      - name: Create Git Tag
        if: steps.version.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.version }}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update marketplace
        if: steps.version.outputs.exists == 'false'
        run: |
          gh api repos/BeOnAuto/auto-plugins/dispatches \
            -f event_type=plugin-release \
            -f 'client_payload[plugin_name]=auto-agent' \
            -f 'client_payload[plugin_version]=${{ steps.version.outputs.version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
