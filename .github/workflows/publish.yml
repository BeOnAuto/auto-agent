name: Publish Packages

on:
  workflow_run:
    workflows: ['Build & Test']
    branches: [main]
    types:
      - completed

jobs:
  release:
    name: Release
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@auto-engineer'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.15.0

      - name: Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm install --no-frozen-lockfile

      - name: Update lockfile if needed
        run: |
          if ! git diff --exit-code pnpm-lock.yaml >/dev/null 2>&1; then
            echo "Lockfile was updated during install"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore(root): update lockfile"
          fi

      - name: Check for changesets
        id: check_changesets
        run: |
          # Use release-automation CLI to check for changesets
          if pnpm release-automation check --require-changesets; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "📦 Changesets detected"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 10 ]; then
              echo "has_changesets=false" >> $GITHUB_OUTPUT
              echo "✨ No changesets to process"
            else
              echo "❌ Error checking changesets (exit code: $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          fi

      - name: Version packages
        if: steps.check_changesets.outputs.has_changesets == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          pnpm run version
          git add .
          git commit -m "chore(global): version packages" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.check_changesets.outputs.has_changesets == 'true'
        id: publish
        run: |
          git pull --rebase
          pnpm release
          echo "published=true" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git Tags
        if: steps.publish.outputs.published == 'true'
        run: |
          # Get the version from package.json
          VERSION=$(node -p "require('./package.json').version")
          COMMIT=$(git rev-parse HEAD)

          echo "Creating tags for version: $VERSION at commit: $COMMIT"

          # Create tags for all packages with the same version (fixed versioning)
          for package_json in packages/*/package.json; do
            if [ -f "$package_json" ]; then
              PACKAGE_NAME=$(node -p "require('./$package_json').name")
              TAG="${PACKAGE_NAME}@${VERSION}"

              echo "Creating tag: $TAG"
              git tag -a "$TAG" -m "Release $PACKAGE_NAME@$VERSION" $COMMIT
              git push origin "$TAG"

              echo "✅ Created and pushed tag: $TAG"
            fi
          done

          # Also tag create-auto-app
          if [ -f "packages/create-auto-app/package.json" ]; then
            TAG="create-auto-app@${VERSION}"
            echo "Creating tag: $TAG"
            git tag -a "$TAG" -m "Release create-auto-app@$VERSION" $COMMIT
            git push origin "$TAG"
            echo "✅ Created and pushed tag: $TAG"
          fi

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Get the changelog for this version
          CHANGELOG=$(awk "/^## ${VERSION}\$/,/^## [0-9]/" CHANGELOG.md | sed '1d;$d')

          # Create a GitHub release
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${CHANGELOG}" \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
