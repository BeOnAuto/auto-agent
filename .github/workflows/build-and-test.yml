name: "Build & Test"

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NEXT_PUBLIC_V0_URL: https://v0.dev
      NEXT_PUBLIC_APP_URL: http://localhost:4000
      NPM_CONFIG_FETCH_RETRIES: "5"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "30000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
          scope: "@auto-engineer"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pre-fetch deps
        run: pnpm fetch --network-concurrency=8

      - name: Install dependencies
        run: |
          set -e
          for i in 1 2 3; do
            if pnpm install --network-concurrency=8 --reporter=append; then
              exit 0
            fi
            echo "pnpm install failed (attempt $i), backing off..."
            sleep $((i*30))
          done
          echo "All install attempts failed"
          exit 1

      - name: Build all workspaces
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm build

      - name: Re-install to link bins
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pnpm install --no-frozen-lockfile

      - name: Lint, format, test
        run: pnpm check

      - name: Send failure notification
        if: failure()
        uses: ./.github/actions/slack-notification
        with:
          job-name: "Build & Test"
          job-status: "failure"
          slack-channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Send success notification
        if: success()
        uses: ./.github/actions/slack-notification
        with:
          job-name: "Build & Test"
          job-status: "success"
          slack-channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}

      # Release steps - only run on main branch pushes
      - name: Check for changesets
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: check_changesets
        run: |
          if pnpm release-automation check --require-changesets; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "📦 Changesets detected"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 10 ]; then
              echo "has_changesets=false" >> $GITHUB_OUTPUT
              echo "✨ No changesets to process"
            else
              echo "❌ Error checking changesets (exit code: $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          fi

      - name: Version packages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.check_changesets.outputs.has_changesets == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          pnpm run version
          git add .
          git commit -m "chore(global): version packages" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.check_changesets.outputs.has_changesets == 'true'
        id: publish
        run: |
          git checkout -- .
          git pull --rebase
          pnpm release
          echo "published=true" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git Tags
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.publish.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          COMMIT=$(git rev-parse HEAD)

          echo "Creating tags for version: $VERSION at commit: $COMMIT"

          for package_json in packages/*/package.json; do
            if [ -f "$package_json" ]; then
              PACKAGE_NAME=$(node -p "require('./$package_json').name")
              TAG="${PACKAGE_NAME}@${VERSION}"

              echo "Creating tag: $TAG"
              git tag -a "$TAG" -m "Release $PACKAGE_NAME@$VERSION" $COMMIT
              git push --no-verify origin "$TAG"

              echo "✅ Created and pushed tag: $TAG"
            fi
          done

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.publish.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          CHANGELOG=$(awk "/^## ${VERSION}\$/,/^## [0-9]/" CHANGELOG.md | sed '1d;$d')

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${CHANGELOG}" \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
